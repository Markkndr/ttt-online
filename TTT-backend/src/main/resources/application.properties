spring.application.name=TTT-backend
server.port=${PORT:8080}

tttonline.database.url=${DATABASE_URL}
tttonline.database.username=${DATABASE_USERNAME}
tttonline.database.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.access-token-key=${JWT_ACCESS_TOKEN_KEY}
jwt.access-token-expiration=900000
jwt.refresh-token-key=${JWT_REFRESH_TOKEN_KEY}
jwt.refresh-token-expiration=604800000